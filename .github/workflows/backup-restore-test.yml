name: Backup Restore Smoke Test

# On-demand (no en cron): baja el último backup de R2, lo desencripta y lo
# restaura en un Postgres efímero para probar que el backup es RESTAURABLE.
# Separado del backup semanal para no cargar cada corrida con un restore.
on:
  workflow_dispatch:

jobs:
  restore-test:
    name: Restore latest R2 backup into an ephemeral Postgres
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: pip install awscli --quiet

      - name: Run restore smoke-test
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          chmod +x scripts/restore-smoke-test.sh
          bash scripts/restore-smoke-test.sh
