name: Weekly Supabase Backup

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  backup:
    name: Backup Supabase to Cloudflare R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin explícito (no "latest", que es un blanco móvil): esta es la versión
          # contra la que se verificó la sintaxis de `db dump` (--db-url/--data-only/
          # --role-only/--use-copy/-f existen y funcionan en 2.75.x).
          version: 2.75.0

      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: Run backup script
        env:
          # Connection string de PROD (proyecto hdqazbuxtpavtioufrsv). El antiguo
          # SUPABASE_PROJECT_REF=uhhatetytaucucihfyyy era el proyecto EQUIVOCADO y
          # --project-ref/--output ya no existen en `supabase db dump` (CLI 2.x).
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # Read-only: solo para descubrir el host del session pooler vía Management
          # API (la conexión directa es IPv6-only y no llega desde los runners).
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          chmod +x scripts/backup-supabase.sh
          bash scripts/backup-supabase.sh

      # Prueba de restore SOLO en dispatch manual (no en el cron semanal, para no
      # cargar cada backup). Restaura el objeto recién subido en un Postgres
      # efímero y cuenta filas — prueba que el backup es restaurable de verdad.
      - name: Restore smoke-test (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          chmod +x scripts/restore-smoke-test.sh
          bash scripts/restore-smoke-test.sh
