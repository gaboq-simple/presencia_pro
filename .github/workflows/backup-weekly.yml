name: Weekly Supabase Backup

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  backup:
    name: Backup Supabase to Cloudflare R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: Run backup script
        env:
          # Connection string de PROD (proyecto hdqazbuxtpavtioufrsv). El antiguo
          # SUPABASE_PROJECT_REF=uhhatetytaucucihfyyy era el proyecto EQUIVOCADO y
          # --project-ref/--output ya no existen en `supabase db dump` (CLI 2.x).
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          chmod +x scripts/backup-supabase.sh
          bash scripts/backup-supabase.sh
